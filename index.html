<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./src/html/index.html">
  <title>La Casa Del Celular - Cargando...</title>
  <link rel="canonical" href="./src/html/index.html">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loader {
      text-align: center;
    }
    .loader .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    .loader p {
      font-size: 1.1rem;
      color: #aaa;
    }
    .loader .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e63946;
      margin-bottom: 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.location.replace("./src/html/index.html");
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div class="brand">La Casa Del Celular</div>
    <p>Redirigiendo a la tienda...</p>
    <noscript>
      <p><a href="./src/html/index.html">Haz clic aqu&iacute; para ir a la tienda</a></p>
    </noscript>
  </div>
</body>
</html>
